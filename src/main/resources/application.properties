# ===========================
# Active Profile
# ===========================
spring.profiles.active=dev

# ===========================
# Database
# ===========================
spring.datasource.url=jdbc:mysql://localhost:3306/hotel_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===========================
# JPA / Hibernate
# ===========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===========================
# Server
# ===========================
server.port=8080

# ===========================
# JWT
# ===========================
jwt.secret=hotelManagementSystemSecretKeyForJWTAuthenticationMustBe256BitsLong2026
jwt.expiration=86400000

# ===========================
# Swagger / OpenAPI
# ===========================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ===========================
# Actuator
# ===========================
management.endpoints.web.exposure.include=health,info,metrics,env
management.endpoint.health.show-details=always
management.info.env.enabled=true
info.app.name=Hotel Management System
info.app.version=1.0.0
info.app.author=Hotel Dev Team

# ===========================
# Logging
# ===========================
logging.level.com.example.hotelmanagementsystem=DEBUG
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/hotel-management.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30
